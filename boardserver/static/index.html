<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Server</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Board Server</h1>
        <nav>
            <button class="tab active" data-view="board">Board</button>
            <button class="tab" data-view="items">Items</button>
            <button class="tab" data-view="inbox">Inbox</button>
            <button class="tab" data-view="events">Events</button>
        </nav>
        <div class="agent-select">
            <label>Acting as:</label>
            <select id="agent-select"></select>
        </div>
    </header>

    <main>
        <!-- Board view (kanban) -->
        <div id="view-board" class="view active">
            <div id="kanban" class="kanban"></div>
        </div>

        <!-- Items list -->
        <div id="view-items" class="view">
            <div class="toolbar">
                <button onclick="showCreateForm()">+ New Item</button>
                <select id="filter-type" onchange="loadItems()">
                    <option value="">All types</option>
                </select>
                <select id="filter-status" onchange="loadItems()">
                    <option value="">All statuses</option>
                </select>
            </div>
            <div id="items-list"></div>
        </div>

        <!-- Inbox -->
        <div id="view-inbox" class="view">
            <div class="toolbar">
                <select id="inbox-agent" onchange="loadInbox()"></select>
                <button onclick="markInboxRead()">Mark all read</button>
            </div>
            <div id="inbox-messages"></div>
            <div class="inbox-send">
                <input id="inbox-to" type="text" placeholder="To agent..." />
                <input id="inbox-msg" type="text" placeholder="Message..." />
                <button onclick="sendInboxMessage()">Send</button>
            </div>
        </div>

        <!-- Events -->
        <div id="view-events" class="view">
            <div id="events-list"></div>
        </div>
    </main>

    <!-- Item detail modal -->
    <div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
        <div class="modal-content">
            <button class="close" onclick="closeModal()">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Create item modal -->
    <div id="create-modal" class="modal" onclick="if(event.target===this)closeCreateModal()">
        <div class="modal-content">
            <button class="close" onclick="closeCreateModal()">&times;</button>
            <h2>Create Item</h2>
            <form id="create-form" onsubmit="createItem(event)">
                <div id="create-fields"></div>
                <button type="submit">Create</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
