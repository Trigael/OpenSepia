limits:
  max_api_calls_per_cycle: 5
  max_daily_cost_usd: 10.0
  max_tokens_per_agent: 8192
  pause_between_agents: 5
project:
  description: 'A better version of the board server. Build a modern, async Python
    board server with: FastAPI instead of stdlib http.server, WebSocket support for
    real-time updates, better search with full-text indexing, role-based access control,
    file attachments on items, sprint management with burndown charts, and a React
    frontend with drag-and-drop kanban.'
  name: Board Server v2
  paths:
    archive: board/archive
    board: board
    logs: logs
    workspace: workspace
  tech_stack:
    ci_cd: gitlab/github
    database: mongodb
    deployment: docker
    framework: fastapi + angular
    language: python + typescript
sprint:
  current_cycle: 2
  current_sprint: 1
  cycles_per_sprint: 10
