limits:
  max_api_calls_per_cycle: 5
  max_daily_cost_usd: 10.0
  max_tokens_per_agent: 8192
  pause_between_agents: 5
project:
  description: 'Build a production-ready project board server for AI agent workflows.
    Tech: Python 3.10+, FastAPI, SQLite, vanilla HTML/JS frontend. Features: REST
    API for items with configurable YAML schema, comments with author tracking, agent
    inbox system, event system with webhooks, web UI with kanban board, sprint management,
    full-text search, sequential IDs, thread-safe SQLite. No external deps beyond
    fastapi + uvicorn + pyyaml. Test suite required.'
  name: Board Server v2
  paths:
    archive: board/archive
    board: board
    logs: logs
    workspace: workspace
  tech_stack:
    ci_cd: gitlab/github
    database: sqlite
    deployment: docker
    framework: fastapi
    language: python
sprint:
  current_cycle: 2
  current_sprint: 2
  cycles_per_sprint: 10
